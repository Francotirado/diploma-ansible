---
- name: Configure kubeconfig for ubuntu user
  hosts: kube_control_plane
  become: true
  gather_facts: false
  vars:
    kube_user: ubuntu
    kube_dir: "/home/{{ kube_user }}/.kube"
    admin_conf: "/etc/kubernetes/admin.conf"
    kubeconfig: "{{ kube_dir }}/config"
  tasks:
    - name: Create .kube directory
      file:
        path: "{{ kube_dir }}"
        state: directory
        owner: "{{ kube_user }}"
        group: "{{ kube_user }}"
        mode: '0755'

    - name: Copy admin.conf to user kubeconfig
      copy:
        src: "{{ admin_conf }}"
        dest: "{{ kubeconfig }}"
        remote_src: true
        owner: "{{ kube_user }}"
        group: "{{ kube_user }}"
        mode: '0644'

    - name: Replace API server address with public IP (access_ip)
      lineinfile:
        path: "{{ kubeconfig }}"
        regexp: '^(\s*)server: https://[\d\.]+:6443'
        line: '\1server: https://{{ hostvars[groups["kube_control_plane"][0]]["access_ip"] }}:6443'
        backrefs: true
      when: hostvars[groups['kube_control_plane'][0]]['access_ip'] is defined
      no_log: true

    - name: Ensure kubeconfig has correct permissions
      file:
        path: "{{ kubeconfig }}"
        owner: "{{ kube_user }}"
        group: "{{ kube_user }}"
        mode: '0600'
